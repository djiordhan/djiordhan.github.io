<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tick Tock Clock Game! 🕐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --sunshine: #FFD93D;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --lavender: #C77DFF;
    --peach: #FFB347;
    --white: #FFFDF7;
    --dark: #2D2D2D;
    --cloud: #F0F8FF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #a8edea 0%, #fed6e3 50%, #ffecd2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
  }

  /* Floating background shapes */
  body::before {
    content: '';
    position: fixed;
    top: -80px; left: -80px;
    width: 300px; height: 300px;
    background: rgba(255,217,61,0.18);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -60px; right: -60px;
    width: 250px; height: 250px;
    background: rgba(107,203,119,0.18);
    border-radius: 50%;
    pointer-events: none;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--coral);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.08);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 1.05rem;
    color: #888;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 18px;
    background: white;
    border-radius: 50px;
    padding: 8px 28px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 800;
    font-size: 1rem;
  }
  .score-item .icon { font-size: 1.3rem; }
  .score-item.correct { color: var(--mint); }
  .score-item.wrong { color: var(--coral); }
  .score-item.streak { color: var(--sunshine); }

  /* Main game card */
  .game-card {
    background: var(--white);
    border-radius: 32px;
    padding: 28px 24px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    max-width: 480px;
    width: 100%;
    position: relative;
    animation: floatIn 0.5s ease;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Analog Clock */
  .clock-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }

  #clock-svg {
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.13));
    transition: transform 0.3s;
  }

  /* Input area */
  .input-section {
    text-align: center;
    margin-bottom: 16px;
  }

  .prompt {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--dark);
    margin-bottom: 10px;
  }

  .time-display {
    background: linear-gradient(135deg, #f0f8ff, #fff);
    border: 3px dashed #C77DFF;
    border-radius: 20px;
    padding: 10px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem;
    letter-spacing: 4px;
    color: var(--dark);
    min-width: 180px;
    display: inline-block;
    margin-bottom: 14px;
    min-height: 68px;
    line-height: 1.2;
    position: relative;
  }
  .time-display .cursor {
    display: inline-block;
    width: 3px;
    height: 2.4rem;
    background: var(--lavender);
    border-radius: 2px;
    margin-left: 3px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Number pad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  .num-btn {
    background: linear-gradient(145deg, #fff 0%, #f0f0f0 100%);
    border: 3px solid transparent;
    border-radius: 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--dark);
    padding: 14px 0;
    cursor: pointer;
    box-shadow: 0 5px 0 #ddd, 0 6px 12px rgba(0,0,0,0.07);
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .num-btn:active, .num-btn.pressed {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #ddd;
  }
  .num-btn:nth-child(3n+1) { border-color: #FFB347; color: #e67e00; }
  .num-btn:nth-child(3n+2) { border-color: #6BCB77; color: #2a7a35; }
  .num-btn:nth-child(3n+3) { border-color: #C77DFF; color: #7a00cc; }
  .num-btn:hover { filter: brightness(0.96); }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 0;
  }

  .action-btn {
    border: none;
    border-radius: 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 14px 0;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12), 0 6px 12px rgba(0,0,0,0.07);
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }

  .btn-clear {
    background: linear-gradient(145deg, #FFB347, #ff9500);
    color: white;
    grid-column: span 1;
  }
  .btn-submit {
    background: linear-gradient(145deg, #6BCB77, #3db34a);
    color: white;
    grid-column: span 2;
    font-size: 1.25rem;
  }

  /* Feedback overlay */
  .feedback {
    position: absolute;
    inset: 0;
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    padding: 20px;
  }
  .feedback.show {
    opacity: 1;
    pointer-events: all;
  }
  .feedback.correct-fb {
    background: rgba(107,203,119,0.92);
    color: white;
  }
  .feedback.wrong-fb {
    background: rgba(255,107,107,0.92);
    color: white;
  }
  .feedback .fb-emoji {
    font-size: 4rem;
    margin-bottom: 10px;
    animation: pop 0.4s ease;
  }
  .feedback .fb-msg { font-size: 1.8rem; margin-bottom: 8px; }
  .feedback .fb-answer { font-size: 1.1rem; opacity: 0.92; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .feedback .next-btn {
    margin-top: 18px;
    background: white;
    border: none;
    border-radius: 50px;
    padding: 12px 36px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    transition: transform 0.12s;
  }
  .feedback.correct-fb .next-btn { color: var(--mint); }
  .feedback.wrong-fb .next-btn { color: var(--coral); }
  .feedback .next-btn:active { transform: scale(0.96); }

  @keyframes pop {
    0%   { transform: scale(0.4) rotate(-10deg); }
    70%  { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  /* Stars */
  .stars {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 6px;
  }
  .star {
    font-size: 1.6rem;
    filter: grayscale(1) opacity(0.3);
    transition: filter 0.4s;
  }
  .star.lit { filter: grayscale(0) opacity(1); }

  /* Hint button */
  .hint-wrap {
    text-align: center;
    margin-top: 10px;
  }
  .hint-btn {
    background: none;
    border: 2px dashed var(--peach);
    border-radius: 50px;
    color: var(--peach);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 6px 18px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .hint-btn:hover { background: rgba(255,179,71,0.1); }
  .hint-text {
    font-size: 0.9rem;
    color: #888;
    margin-top: 6px;
    font-weight: 700;
    min-height: 20px;
  }

  /* Decorative floating elements */
  .deco {
    position: fixed;
    pointer-events: none;
    font-size: 2rem;
    animation: float 6s ease-in-out infinite;
    opacity: 0.55;
  }
  .deco:nth-child(1)  { top: 8%;  left: 4%;  animation-delay: 0s; }
  .deco:nth-child(2)  { top: 15%; right: 5%; animation-delay: 1.5s; }
  .deco:nth-child(3)  { bottom: 18%; left: 5%; animation-delay: 3s; }
  .deco:nth-child(4)  { bottom: 8%; right: 7%; animation-delay: 1s; }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-14px) rotate(8deg); }
  }

  .colon-blink { animation: blink 1.2s step-end infinite; }
</style>
</head>
<body>

<!-- Deco elements -->
<div class="deco">⭐</div>
<div class="deco">🌈</div>
<div class="deco">🌟</div>
<div class="deco">🎈</div>

<h1>🕐 Tick Tock!</h1>
<p class="subtitle">What time does the clock show?</p>

<div class="score-bar">
  <div class="score-item correct"><span class="icon">✅</span> <span id="score-correct">0</span></div>
  <div class="score-item wrong"><span class="icon">❌</span> <span id="score-wrong">0</span></div>
  <div class="score-item streak"><span class="icon">🔥</span> <span id="score-streak">0</span></div>
</div>

<div class="game-card">

  <!-- Stars -->
  <div class="stars">
    <span class="star" id="s1">⭐</span>
    <span class="star" id="s2">⭐</span>
    <span class="star" id="s3">⭐</span>
    <span class="star" id="s4">⭐</span>
    <span class="star" id="s5">⭐</span>
  </div>

  <!-- Analog clock -->
  <div class="clock-wrap">
    <svg id="clock-svg" width="220" height="220" viewBox="0 0 220 220">
      <!-- Outer ring -->
      <circle cx="110" cy="110" r="108" fill="white" stroke="#E8E8E8" stroke-width="3"/>
      <!-- Colorful ring -->
      <circle cx="110" cy="110" r="102" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#FF6B6B"/>
          <stop offset="33%" stop-color="#FFD93D"/>
          <stop offset="66%" stop-color="#6BCB77"/>
          <stop offset="100%" stop-color="#C77DFF"/>
        </linearGradient>
      </defs>

      <!-- Hour tick marks + numbers -->
      <g id="hour-marks"></g>

      <!-- Minute tick marks (5-min only) -->
      <g id="min-marks"></g>

      <!-- Hour hand -->
      <line id="hour-hand" x1="110" y1="110" x2="110" y2="55"
        stroke="#FF6B6B" stroke-width="8" stroke-linecap="round"
        style="transform-origin:110px 110px; transition: transform 0.6s cubic-bezier(.34,1.56,.64,1)"/>

      <!-- Minute hand -->
      <line id="min-hand" x1="110" y1="110" x2="110" y2="35"
        stroke="#6BCB77" stroke-width="5" stroke-linecap="round"
        style="transform-origin:110px 110px; transition: transform 0.6s cubic-bezier(.34,1.56,.64,1)"/>

      <!-- Center dot -->
      <circle cx="110" cy="110" r="9" fill="#FFD93D" stroke="white" stroke-width="3"/>
      <circle cx="110" cy="110" r="4" fill="#e67e00"/>
    </svg>
  </div>

  <!-- Time input display -->
  <div class="input-section">
    <div class="prompt">⏰ What time is it?</div>
    <div class="time-display" id="time-display">
      <span id="hour-display">__</span><span class="colon-blink">:</span><span id="min-display">__</span>
      <span class="cursor" id="cursor"></span>
    </div>
  </div>

  <!-- Number pad -->
  <div class="numpad" id="numpad">
    <button class="num-btn" data-val="1">1</button>
    <button class="num-btn" data-val="2">2</button>
    <button class="num-btn" data-val="3">3</button>
    <button class="num-btn" data-val="4">4</button>
    <button class="num-btn" data-val="5">5</button>
    <button class="num-btn" data-val="6">6</button>
    <button class="num-btn" data-val="7">7</button>
    <button class="num-btn" data-val="8">8</button>
    <button class="num-btn" data-val="9">9</button>
    <button class="num-btn" data-val="0" style="grid-column:2">0</button>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="action-btn btn-clear" id="btn-clear">⌫ Del</button>
    <button class="action-btn btn-submit" id="btn-submit">✅ Check!</button>
  </div>

  <div class="hint-wrap">
    <button class="hint-btn" id="hint-btn">💡 Give me a hint!</button>
    <div class="hint-text" id="hint-text"></div>
  </div>

  <!-- Feedback overlay -->
  <div class="feedback" id="feedback">
    <div class="fb-emoji" id="fb-emoji">🎉</div>
    <div class="fb-msg" id="fb-msg">Amazing!</div>
    <div class="fb-answer" id="fb-answer"></div>
    <button class="next-btn" id="next-btn">Next Clock ➡️</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────
let targetH = 0, targetM = 0;
let input = '';      // raw digit buffer
let phase = 'hour';  // 'hour' | 'min'
let correct = 0, wrong = 0, streak = 0;
let hintUsed = false;

const CORRECT_MSGS = ['Amazing! 🎉','You got it! 🌟','Super Smart! 🧠','Brilliant! ✨','WOW! 🚀','Awesome! 🏆','High Five! ✋','You rock! 🎸'];
const WRONG_MSGS   = ['Oops! Try again!','Not quite… 😊','So close!','Keep trying! 💪'];

// ─── Draw clock tick marks & numbers ─────────────
(function buildClockFace() {
  const marks = document.getElementById('hour-marks');
  const minMarks = document.getElementById('min-marks');
  for (let h = 1; h <= 12; h++) {
    const ang = (h / 12) * 2 * Math.PI - Math.PI/2;
    const nx = 110 + 82 * Math.cos(ang);
    const ny = 110 + 82 * Math.sin(ang);
    const colors = ['#FF6B6B','#FFB347','#FFD93D','#6BCB77','#4FC3F7','#C77DFF'];
    const c = colors[h % colors.length];
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', nx); txt.setAttribute('y', ny);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dominant-baseline','central');
    txt.setAttribute('font-size','17');
    txt.setAttribute('font-family',"'Fredoka One', cursive");
    txt.setAttribute('fill', c);
    txt.setAttribute('font-weight','700');
    txt.textContent = h;
    marks.appendChild(txt);
  }
  // 5-min tick marks
  for (let m = 0; m < 12; m++) {
    const ang = (m / 12) * 2 * Math.PI - Math.PI/2;
    const r1 = 94, r2 = 100;
    const x1 = 110 + r1*Math.cos(ang), y1 = 110 + r1*Math.sin(ang);
    const x2 = 110 + r2*Math.cos(ang), y2 = 110 + r2*Math.sin(ang);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','#ccc'); line.setAttribute('stroke-width','2');
    minMarks.appendChild(line);
  }
})();

// ─── Clock hands ─────────────────────────────────
function setHands(h, m) {
  const hourAng  = (h % 12) / 12 * 360 + m / 60 * 30;
  const minAng   = m / 60 * 360;
  document.getElementById('hour-hand').style.transform = `rotate(${hourAng}deg)`;
  document.getElementById('min-hand').style.transform  = `rotate(${minAng}deg)`;
}

// ─── New question ─────────────────────────────────
function newQuestion() {
  targetH = Math.floor(Math.random() * 12) + 1; // 1–12
  const minSteps = [0,5,10,15,20,25,30,35,40,45,50,55];
  targetM = minSteps[Math.floor(Math.random() * minSteps.length)];
  setHands(targetH, targetM);
  resetInput();
  document.getElementById('hint-text').textContent = '';
  document.getElementById('hint-btn').disabled = false;
  hintUsed = false;
  hideFeedback();
}

function resetInput() {
  input = ''; phase = 'hour';
  updateDisplay();
}

function updateDisplay() {
  const hEl = document.getElementById('hour-display');
  const mEl = document.getElementById('min-display');
  if (phase === 'hour') {
    hEl.textContent = input.length ? input : '__';
    mEl.textContent = '__';
  } else {
    hEl.textContent = input.slice(0, 2).padStart(2,'0').replace(/^0/,'') || '__';
    // min chars
    const minPart = input.slice(2);
    mEl.textContent = minPart.length === 0 ? '__' : minPart.padEnd(2,'_');
  }
}

// ─── Input logic ──────────────────────────────────
function handleDigit(d) {
  if (document.getElementById('feedback').classList.contains('show')) return;

  if (phase === 'hour') {
    const tentative = input + d;
    const val = parseInt(tentative);
    if (tentative.length === 1) {
      if (d === '0') return; // can't start with 0 for hours
      input = tentative;
      if (val >= 2) { commitHour(); } // single-digit hour ≥2 → go to min
    } else if (tentative.length === 2) {
      if (val >= 1 && val <= 12) { input = tentative; commitHour(); }
      else if (tentative[0] === '1' && d === '0') { input = tentative; commitHour(); } // 10
    }
  } else {
    // minute phase — collect up to 2 digits
    const minPart = input.slice(2) + d;
    if (minPart.length === 1) {
      if (!['0','1','2','3','4','5'].includes(d)) return; // first digit 0-5
      input = input.slice(0,2) + minPart;
    } else {
      const mVal = parseInt(minPart);
      if (mVal % 5 !== 0) { shakeDisplay(); return; }
      input = input.slice(0,2) + minPart;
      autoCheck();
      return;
    }
  }
  updateDisplay();
}

function commitHour() {
  phase = 'min';
  updateDisplay();
}

function handleDelete() {
  if (document.getElementById('feedback').classList.contains('show')) return;
  if (phase === 'min') {
    const minPart = input.slice(2);
    if (minPart.length > 0) {
      input = input.slice(0, input.length - 1);
    } else {
      // go back to hour
      input = input.slice(0,2);
      phase = 'hour';
      // trim to what was entered
    }
  } else {
    input = input.slice(0, -1);
  }
  updateDisplay();
}

function autoCheck() {
  updateDisplay();
  setTimeout(checkAnswer, 200);
}

function shakeDisplay() {
  const d = document.getElementById('time-display');
  d.style.animation = 'none';
  d.offsetHeight;
  d.style.animation = 'shake 0.4s ease';
}

// ─── Check ────────────────────────────────────────
function checkAnswer() {
  if (phase !== 'min' || input.slice(2).length < 2) {
    // not complete
    shakeDisplay();
    return;
  }
  const guessH = parseInt(input.slice(0,2));
  const guessM = parseInt(input.slice(2));
  const isCorrect = guessH === targetH && guessM === targetM;

  if (isCorrect) {
    correct++;
    streak++;
    document.getElementById('score-correct').textContent = correct;
    document.getElementById('score-streak').textContent = streak;
    lightStars(streak);
    showFeedback(true);
  } else {
    wrong++;
    streak = 0;
    document.getElementById('score-wrong').textContent = wrong;
    document.getElementById('score-streak').textContent = streak;
    showFeedback(false, guessH, guessM);
  }
}

// ─── Feedback ─────────────────────────────────────
function showFeedback(ok, gh, gm) {
  const fb = document.getElementById('feedback');
  const emoji = document.getElementById('fb-emoji');
  const msg   = document.getElementById('fb-msg');
  const ans   = document.getElementById('fb-answer');

  if (ok) {
    fb.className = 'feedback correct-fb show';
    emoji.textContent = ['🎉','🌟','🏆','🥳','🎊','✨'][Math.floor(Math.random()*6)];
    msg.textContent = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];
    ans.textContent = `The time was ${targetH}:${String(targetM).padStart(2,'0')}`;
  } else {
    fb.className = 'feedback wrong-fb show';
    emoji.textContent = ['😅','🙈','💭','🤔'][Math.floor(Math.random()*4)];
    msg.textContent = WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
    ans.textContent = `The answer was ${targetH}:${String(targetM).padStart(2,'0')}`;
  }
}

function hideFeedback() {
  document.getElementById('feedback').className = 'feedback';
}

// ─── Stars ────────────────────────────────────────
function lightStars(s) {
  for (let i = 1; i <= 5; i++) {
    document.getElementById('s'+i).classList.toggle('lit', i <= Math.min(s,5));
  }
}

// ─── Hint ─────────────────────────────────────────
document.getElementById('hint-btn').addEventListener('click', () => {
  hintUsed = true;
  const h = targetH, m = targetM;
  let minWord = '';
  if (m === 0)  minWord = "exactly on the hour (12)";
  else if (m === 15) minWord = "on the 3";
  else if (m === 30) minWord = "on the 6";
  else if (m === 45) minWord = "on the 9";
  else minWord = `near the ${m/5}`;
  document.getElementById('hint-text').textContent = `🔵 Hour hand points near ${h}. 🟢 Minute hand is ${minWord}.`;
  document.getElementById('hint-btn').disabled = true;
});

// ─── Event listeners ──────────────────────────────
document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('.num-btn');
  if (!btn) return;
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 120);
  handleDigit(btn.dataset.val);
});

document.getElementById('btn-clear').addEventListener('click', handleDelete);
document.getElementById('btn-submit').addEventListener('click', () => {
  if (phase === 'min' && input.slice(2).length === 2) checkAnswer();
  else shakeDisplay();
});
document.getElementById('next-btn').addEventListener('click', newQuestion);

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') handleDigit(e.key);
  else if (e.key === 'Backspace') handleDelete();
  else if (e.key === 'Enter') {
    if (document.getElementById('feedback').classList.contains('show')) newQuestion();
    else checkAnswer();
  }
});

// CSS shake
const style = document.createElement('style');
style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }`;
document.head.appendChild(style);

// ─── Start ────────────────────────────────────────
newQuestion();
</script>
</body>
</html>
